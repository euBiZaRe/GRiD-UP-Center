<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --background: #0d0d0d;
      --accent: #00e5ff;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--background);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .logo-container {
      position: relative;
      width: 320px;
      margin-bottom: 30px;
    }

    .premium-logo {
      width: 100%;
      filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.2));
      animation: logo-reveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes logo-reveal {
      0% { transform: scale(0.8) rotate(-5deg); opacity: 0; filter: blur(10px); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0); }
    }

    .logo-shimmer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(
        135deg,
        transparent 0%,
        transparent 45%,
        rgba(0, 229, 255, 0.4) 50%,
        transparent 55%,
        transparent 100%
      );
      background-size: 250% 250%;
      animation: shimmer-flow 2s infinite ease-in-out;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    @keyframes shimmer-flow {
      0% { background-position: 200% 200%; }
      100% { background-position: -100% -100%; }
    }

    .loading-bar-container {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
      position: relative;
    }

    .loading-bar-fill {
      height: 100%;
      width: 100%;
      background: var(--accent);
      box-shadow: 0 0 15px var(--accent);
      transform-origin: left;
      animation: loading-fill 3s infinite ease-in-out;
    }

    @keyframes loading-fill {
      0% { transform: scaleX(0) translateX(0); }
      50% { transform: scaleX(0.5) translateX(100%); }
      100% { transform: scaleX(0) translateX(200%); }
    }

    .status {
      font-size: 9px;
      font-weight: 900;
      font-style: italic;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-top: 25px;
      height: 14px;
    }

    .status::after {
      content: 'Connecting to Firebase...';
      animation: status-change 3s steps(1) forwards;
    }

    @keyframes status-change {
      0% { content: 'Connecting to Firebase...'; }
      33% { content: 'Initialising telemetry...'; }
      66% { content: 'Loading assets...'; }
      100% { content: 'Ready'; }
    }
  </style>
</head>
